  <line x1="256" y1="125" x2="256" y2="140" stroke="#EF9F27" stroke-width="4" stroke-linecap="round"/>
  <line x1="341" y1="210" x2="326" y2="210" stroke="#EF9F27" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="295" x2="256" y2="280" stroke="#EF9F27" stroke-width="4" stroke-linecap="round"/>
  <line x1="171" y1="210" x2="186" y2="210" stroke="#EF9F27" stroke-width="4" stroke-linecap="round"/>
  <!-- Minor markers -->
  <line x1="298" y1="134" x2="291" y2="146" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="332" y1="168" x2="320" y2="175" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="332" y1="252" x2="320" y2="245" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="298" y1="286" x2="291" y2="274" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="214" y1="286" x2="221" y2="274" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="180" y1="252" x2="192" y2="245" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="180" y1="168" x2="192" y2="175" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="214" y1="134" x2="221" y2="146" stroke="#EF9F27" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="256" y1="210" x2="256" y2="140" stroke="#E1F5EE" stroke-width="4" stroke-linecap="round"/>
