  <!-- Dollar sign -->
  <text x="256" y="388" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="500" fill="#5DCAA5">$</text>
  <!-- FT initials -->
  <text x="256" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="600" letter-spacing="4" fill="#5DCAA5" opacity="0.7">FT</text>
</svg>
