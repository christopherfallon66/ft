<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="102" fill="#0F3D2E"/>
  <!-- Shield -->
  <path d="M256 52 L410 120 L410 280 Q410 380 256 452 Q102 380 102 280 L102 120 Z" fill="#0A2E22" stroke="#EF9F27" stroke-width="8"/>
  <path d="M256 68 L396 130 L396 276 Q396 368 256 436 Q116 368 116 276 L116 130 Z" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.3"/>
